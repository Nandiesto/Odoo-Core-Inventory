<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Core Inventory</title>
    <script type="module" crossorigin src="/assets/index-XErkdiMN.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CrKCEcfr.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="color:red; background: black; padding: 20px; z-index: 9999; position: absolute; top:0; left:0; right:0;">' + e.message + '<br/>' + e.filename + ':' + e.lineno + '</div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML += '<div style="color:red; background: black; padding: 20px; z-index: 9999; position: absolute; top:0; left:0; right:0;">' + e.reason + '</div>';
      });
    </script>
  </body>
</html>
