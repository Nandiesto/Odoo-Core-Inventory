{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Core Inventory{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card animate-scale">
      <div class="brand-icon">📦</div>
      {% if messages %}
      <ul class="messages">
        {% for message in messages %}
        <li class="message message-{{ message.tags }}">
          <i class="fas {% if message.tags == 'success' %}fa-check-circle{% elif message.tags == 'error' %}fa-exclamation-circle{% else %}fa-info-circle{% endif %}"></i>
          {{ message }}
        </li>
        {% endfor %}
      </ul>
      {% endif %}
      {% block auth_content %}{% endblock %}
    </div>
  </div>
</body>
</html>
